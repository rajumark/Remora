  build-linux:
    name: Build Linux AppImage
    if: contains(github.event.head_commit.message, '#go')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y file fuse libfuse2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Linux AppImage
        run: ./gradlew composeApp:packageAppImage

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Remora-Linux-AppImage
          path: composeApp/build/compose/binaries/main/appimage/*.AppImage
          retention-days: 30

  # build-mac-intel:
  #   name: Build Mac DMG (Intel)
