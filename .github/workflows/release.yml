name: Release Remora

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  check-trigger:
    name: Check for #go trigger
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check-trigger.outputs.should-run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit message for #go
        id: check-trigger
        run: |
          if git log --format=%B -n 1 ${{ github.sha }} | grep -q "#go"; then
            echo "should-run=true" >> $GITHUB_OUTPUT
          else
            echo "should-run=false" >> $GITHUB_OUTPUT
          fi

  build-windows:
    name: Build Windows MSI
    needs: check-trigger
    if: needs.check-trigger.outputs.should-run == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        shell: bash

      - name: Build Windows MSI
        run: ./gradlew composeApp:packageMsi

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: Remora-Windows-MSI
          path: composeApp/build/compose/binaries/main/msi/*.msi
          retention-days: 30

  build-linux:
    name: Build Linux AppImage
    needs: check-trigger
    if: needs.check-trigger.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y file fuse libfuse2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Linux AppImage
        run: ./gradlew composeApp:packageAppImage

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Remora-Linux-AppImage
          path: composeApp/build/compose/binaries/main/appimage/*.AppImage
          retention-days: 30

  build-mac-intel:
    name: Build Mac DMG (Intel)
    needs: check-trigger
    if: needs.check-trigger.outputs.should-run == 'true'
    runs-on: macos-13
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Mac DMG (Intel)
        run: ./gradlew composeApp:packageDmg

      - name: Upload Mac DMG (Intel)
        uses: actions/upload-artifact@v4
        with:
          name: Remora-Mac-Intel-DMG
          path: composeApp/build/compose/binaries/main/dmg/*.dmg
          retention-days: 30

  build-mac-apple-silicon:
    name: Build Mac DMG (Apple Silicon)
    needs: check-trigger
    if: needs.check-trigger.outputs.should-run == 'true'
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Mac DMG (Apple Silicon)
        run: ./gradlew composeApp:packageDmg

      - name: Upload Mac DMG (Apple Silicon)
        uses: actions/upload-artifact@v4
        with:
          name: Remora-Mac-AppleSilicon-DMG
          path: composeApp/build/compose/binaries/main/dmg/*.dmg
          retention-days: 30

  create-release:
    name: Create Release
    needs: [check-trigger, build-windows, build-linux, build-mac-intel, build-mac-apple-silicon]
    if: needs.check-trigger.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure of downloaded files
        run: ls -R ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          name: Remora-1.0.0
          draft: false
          prerelease: false
          files: |
            ./artifacts/Remora-Windows-MSI/*.msi
            ./artifacts/Remora-Linux-AppImage/*.AppImage
            ./artifacts/Remora-Mac-Intel-DMG/*.dmg
            ./artifacts/Remora-Mac-AppleSilicon-DMG/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}
