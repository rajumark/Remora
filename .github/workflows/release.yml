name: Release Remora

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows MSI
    if: contains(github.event.head_commit.message, '#go')
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        shell: bash

      - name: Build Windows MSI
        run: ./gradlew composeApp:packageMsi

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: Remora-Windows-MSI
          path: composeApp/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error
          retention-days: 30

  build-linux:
    name: Build Linux portable bundle
    if: contains(github.event.head_commit.message, '#go')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Compose maps AppImage to jpackage --type app-image: a self-contained app directory, not a *.AppImage file.
      - name: Build Linux application image
        run: ./gradlew composeApp:packageAppImage

      - name: Collect Linux bundle
        run: |
          set -euo pipefail
          APP_ROOT="composeApp/build/compose/binaries/main/app"
          test -d "$APP_ROOT"
          ls -la "$APP_ROOT"
          mkdir -p artifacts/linux
          version=$(grep -oE 'packageVersion = "[0-9]+\.[0-9]+\.[0-9]+"' composeApp/build.gradle.kts | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          out="artifacts/linux/Remora-${version}-linux-x64.tar.gz"
          tar -C "$APP_ROOT" -czf "$out" .
          test -s "$out"
          ls -lh artifacts/linux

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: Remora-Linux
          path: artifacts/linux/*.tar.gz
          if-no-files-found: error
          retention-days: 30

  # build-mac-intel:
  #   name: Build Mac DMG (Intel)
  #   if: contains(github.event.head_commit.message, '#go')
  #   runs-on: macos-13
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4

  #     - name: Set up JDK
  #       uses: actions/setup-java@v4
  #       with:
  #         distribution: 'temurin'
  #         java-version: '17'

  #     - name: Grant execute permission for gradlew
  #       run: chmod +x gradlew

  #     - name: Build Mac DMG (Intel)
  #       run: ./gradlew composeApp:packageDmg

  #     - name: Upload Mac DMG (Intel)
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: Remora-Mac-Intel-DMG
  #         path: composeApp/build/compose/binaries/main/dmg/*.dmg
  #         retention-days: 30

  build-mac-apple-silicon:
    name: Build Mac DMG (Apple Silicon)
    if: contains(github.event.head_commit.message, '#go')
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Mac DMG (Apple Silicon)
        run: ./gradlew composeApp:packageDmg

      - name: Upload Mac DMG (Apple Silicon)
        uses: actions/upload-artifact@v4
        with:
          name: Remora-Mac-AppleSilicon-DMG
          path: composeApp/build/compose/binaries/main/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30

  create-release:
    name: Create Release
    needs: [build-windows, build-linux, build-mac-apple-silicon]
    if: contains(github.event.head_commit.message, '#go')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Git user
        run: |
          git config --global user.name "rajumark"
          git config --global user.email "raju348636@gmail.com"

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          version=$(grep -oE 'packageVersion = "[0-9]+\.[0-9]+\.[0-9]+"' composeApp/build.gradle.kts | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Extracted version: $version"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure of downloaded files
        run: ls -R ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Remora-${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/Remora-Windows-MSI/*.msi
            ./artifacts/Remora-Linux/*.tar.gz
            ./artifacts/Remora-Mac-AppleSilicon-DMG/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}
