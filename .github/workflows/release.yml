  #     - name: Build Mac DMG (Intel)
  #       run: ./gradlew composeApp:packageDmg

  #     - name: Upload Mac DMG (Intel)
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: Remora-Mac-Intel-DMG
  #         path: composeApp/build/compose/binaries/main/dmg/*.dmg
  #         retention-days: 30

  build-mac-apple-silicon:
    name: Build Mac DMG (Apple Silicon)
    if: contains(github.event.head_commit.message, '#go')
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Mac DMG (Apple Silicon)
        run: ./gradlew composeApp:packageDmg

      - name: Upload Mac DMG (Apple Silicon)
        uses: actions/upload-artifact@v4
        with:
          name: Remora-Mac-AppleSilicon-DMG
          path: composeApp/build/compose/binaries/main/dmg/*.dmg
          retention-days: 30

  create-release:
    name: Create Release
    needs: [build-linux, build-mac-apple-silicon]
    if: contains(github.event.head_commit.message, '#go')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Git user
        run: |
          git config --global user.name "rajumark"
          git config --global user.email "raju348636@gmail.com"

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          version=$(grep -oE 'packageVersion = "[0-9]+\.[0-9]+\.[0-9]+"' composeApp/build.gradle.kts | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Extracted version: $version"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure of downloaded files
        run: ls -R ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Remora-${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/Remora-Linux-AppImage/*.AppImage
            ./artifacts/Remora-Mac-AppleSilicon-DMG/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}
